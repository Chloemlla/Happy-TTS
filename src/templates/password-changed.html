<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="email=no" />
    <meta name="format-detection" content="date=no" />
    <title>Synapse 账号密码变更通知</title>
    <style>
        .afal a {
            color: #b0b0b0;
            text-decoration: none;
        }

        @media screen and (min-width: 600px) {
            .mdv2rw {
                padding: 40px 40px;
            }
        }
    </style>
    <link href="//fonts.googleapis.com/css?family=Google+Sans" rel="stylesheet" type="text/css" />
</head>

<body style="margin: 0; padding: 0;" bgcolor="#FFFFFF">
    <table width="100%" height="100%" style="min-width: 348px;" border="0" cellspacing="0" cellpadding="0">
        <tr height="32" style="height: 32px;">
            <td></td>
        </tr>
        <tr align="center">
            <td>
                <table border="0" cellspacing="0" cellpadding="0"
                    style="padding-bottom: 20px; max-width: 516px; min-width: 220px;">
                    <tr>
                        <td width="8" style="width: 8px;"></td>
                        <td>
                            <div style="border-style: solid; border-width: thin; border-color: #dadce0; border-radius: 8px; padding: 40px 20px;"
                                align="center" class="mdv2rw">
                                <!-- Logo -->
                                <img src="https://picui.ogmua.cn/s1/2026/03/29/69c8f6226a17c.webp?cysign=7b7f50fdb5f6371abd9d7ef17f3d9146&cyt=1774771394" width="44" height="44" alt="Logo" style="display: inline-block; border-radius: 50%; margin-bottom: 16px;" />

                                <!-- Title -->
                                <div
                                    style="font-family: 'Google Sans', Roboto, RobotoDraft, Helvetica, Arial, sans-serif; border-bottom: thin solid #dadce0; color: rgba(0,0,0,0.87); line-height: 32px; padding-bottom: 24px; text-align: center; word-break: break-word;">
                                    <div style="font-size: 24px;">账号密码变更通知</div>
                                    <table align="center" style="margin-top: 8px;">
                                        <tr style="line-height: normal;">
                                            <td>
                                                <span
                                                    style="font-family: 'Google Sans', Roboto, Arial, sans-serif; color: rgba(0,0,0,0.87); font-size: 14px; line-height: 20px;">尊敬的
                                                    {{username}}：</span>
                                            </td>
                                        </tr>
                                    </table>
                                </div>

                                <!-- Body -->
                                <div
                                    style="font-family: Roboto-Regular, Helvetica, Arial, sans-serif; font-size: 14px; color: rgba(0,0,0,0.87); line-height: 20px; padding-top: 20px; text-align: left;">
                                    <p>您的 Synapse 账号密码已于 <strong>{{changeTime}}</strong> 被成功变更。以下是此次操作的详细信息：</p>

                                    <!-- Device Info Table -->
                                    <table width="100%" cellspacing="0" cellpadding="0"
                                        style="margin-top: 16px; margin-bottom: 16px; border: 1px solid #e8eaed; border-radius: 8px; overflow: hidden;">
                                        <tr style="background-color: #f8f9fa;">
                                            <td
                                                style="padding: 10px 16px; font-size: 13px; color: #5f6368; border-bottom: 1px solid #e8eaed; width: 100px;">
                                                IP 地址
                                            </td>
                                            <td
                                                style="padding: 10px 16px; font-size: 13px; color: rgba(0,0,0,0.87); border-bottom: 1px solid #e8eaed;">
                                                {{ipAddress}}
                                            </td>
                                        </tr>
                                        <tr>
                                            <td
                                                style="padding: 10px 16px; font-size: 13px; color: #5f6368; border-bottom: 1px solid #e8eaed;">
                                                设备名称
                                            </td>
                                            <td
                                                style="padding: 10px 16px; font-size: 13px; color: rgba(0,0,0,0.87); border-bottom: 1px solid #e8eaed;">
                                                {{deviceName}}
                                            </td>
                                        </tr>
                                        <tr style="background-color: #f8f9fa;">
                                            <td style="padding: 10px 16px; font-size: 13px; color: #5f6368;">
                                                设备指纹
                                            </td>
                                            <td
                                                style="padding: 10px 16px; font-size: 13px; color: rgba(0,0,0,0.87); font-family: monospace;">
                                                {{fingerprint}}
                                            </td>
                                        </tr>
                                    </table>

                                    {{adminNotice}}

                                    <div style="padding-top: 16px;">
                                        <div style="border-bottom: thin solid #dadce0; padding-bottom: 24px;">
                                            <span
                                                style="color: #d93025; font-size: 13px;">安全提示：如果这不是您本人的操作，您的账号可能已遭到未经授权的访问。请立即通过密码重置功能修改密码，并检查账号安全设置。</span>
                                        </div>
                                    </div>
                                </div>

                                <!-- Footer inside card -->
                                <div
                                    style="padding-top: 20px; font-size: 12px; line-height: 16px; color: #5f6368; letter-spacing: 0.3px; text-align: center;">
                                    本邮件由系统自动发出，请勿直接回复。
                                </div>
                            </div>

                            <!-- Footer outside card -->
                            <div style="text-align: left;">
                                <div
                                    style="font-family: Roboto-Regular, Helvetica, Arial, sans-serif; color: rgba(0,0,0,0.54); font-size: 11px; line-height: 18px; padding-top: 12px; text-align: center;">
                                    <div>Synapse 团队 · 致力于让文字拥有声音的力量</div>
                                    <div style="direction: ltr;">&copy; 2026 Synapse</div>
                                </div>
                            </div>
                        </td>
                        <td width="8" style="width: 8px;"></td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr height="32" style="height: 32px;">
            <td></td>
        </tr>
    </table>
</body>

</html>
