<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
    <style>
        @media screen and (min-width: 600px) { .card { padding: 40px 40px !important; } }
    </style>
</head>
<body style="margin: 0; padding: 0; font-family: 'Google Sans', Roboto, Helvetica, Arial, sans-serif;" bgcolor="#FFFFFF">
    <table width="100%" border="0" cellspacing="0" cellpadding="0">
        <tr height="32"><td></td></tr>
        <tr align="center">
            <td>
                <table border="0" cellspacing="0" cellpadding="0" style="max-width: 516px; min-width: 220px; width: 100%;">
                    <tr>
                        <td width="8"></td>
                        <td>
                            <div style="border: 1px solid #dadce0; border-radius: 8px; padding: 40px 20px;" align="center" class="card">
                                <img src="https://picui.ogmua.cn/s1/2026/03/29/69c8f6226a17c.webp" width="44" height="44" style="margin-bottom: 16px; border-radius: 50%;" />
                                <div style="border-bottom: 1px solid #dadce0; color: rgba(0,0,0,0.87); line-height: 32px; padding-bottom: 24px; text-align: center;">
                                    <div style="font-size: 24px;">{{title}}</div>
                                    <div style="font-size: 14px; margin-top: 8px;">尊敬的 {{username}}：</div>
                                </div>
                                <div style="font-size: 14px; color: rgba(0,0,0,0.87); line-height: 20px; padding-top: 20px; text-align: left;">
                                    <p>{{description}}</p>
                                    <div style="background-color: #f8f9fa; border-radius: 4px; padding: 16px; margin: 16px 0;">
                                        <table width="100%" cellspacing="0" cellpadding="0">
                                            <tr><td style="color: #5f6368; width: 80px; padding-bottom: 8px;">操作时间</td><td style="font-weight: 500; padding-bottom: 8px;">{{time}}</td></tr>
                                            <tr><td style="color: #5f6368; padding-bottom: 8px;">IP 地址</td><td style="font-weight: 500; padding-bottom: 8px;">{{ip}}</td></tr>
                                            <tr><td style="color: #5f6368;">设备/环境</td><td style="font-weight: 500;">{{device}}</td></tr>
                                        </table>
                                    </div>
                                    <p style="color: #d93025; font-weight: 500;">{{warning}}</p>
                                </div>
                                <div style="padding-top: 20px; font-size: 12px; color: #5f6368; text-align: center; border-top: 1px solid #dadce0; margin-top: 24px;">
                                    本邮件由系统自动发出，请勿回复。
                                </div>
                            </div>
                            <div style="text-align: center; color: rgba(0,0,0,0.54); font-size: 11px; padding-top: 12px;">
                                <div>Synapse 团队 · 致力于让文字拥有声音的力量</div>
                                <div>&copy; 2026 Synapse</div>
                            </div>
                        </td>
                        <td width="8"></td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr height="32"><td></td></tr>
    </table>
</body>
</html>
